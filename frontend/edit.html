<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="profile.css"> <style>
        .edit-container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>Edit Profile</h2>
        <form action="/update-profile" method="POST">
            <label>Full Name</label>
            <input type="text" name="userName" placeholder="username" id="username" required>
            
            <label>Location</label>
            <input type="text" name="userLocation" placeholder="location" id="userLocation" required>
            
            <button type="submit">Save Changes</button>
        </form>
        <p style="text-align: center;"><a href="profile.html">Cancel</a></p>
    </div>
</body>
</html>
