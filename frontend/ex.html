<!DOCTYPE html>
<html>
<head>
  <title>Google Map Test</title>
  <style>
    #map {
      height: 400px;
      width: 100%;
    }
  </style>
</head>
<body>

<h3>My First Map</h3>
<div id="map"></div>

<script>
function initMap() {
  var location = { lat: 23.2599, lng: 77.4126 }; // Bhopal
  var map = new google.maps.Map(document.getElementById("map"), {
    zoom: 10,
    center: location
  });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFqFxVZhFehQtKjmIpg_WnaJdNnbvMDio&callback=initMap" async defer></script>

</body>
</html>
